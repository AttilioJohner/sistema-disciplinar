<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Fichas Disciplinares</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .config-section {
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e6ff;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .url-example {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn.success {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .results {
            margin-top: 30px;
        }

        .summary-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-box {
            background: linear-gradient(135deg, #f8f9ff, #fff);
            border: 1px solid #e0e6ff;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }

        .summary-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .summary-label {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .student-card {
            background: linear-gradient(135deg, #f8f9ff, #fff);
            border: 1px solid #e0e6ff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .student-card:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2ff;
        }

        .student-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
        }

        .student-class {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        .student-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e0e6ff;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-number.total { color: #667eea; }
        .stat-number.injustificada { color: #dc3545; }
        .stat-number.justificada { color: #28a745; }
        .stat-number.presente { color: #17a2b8; }

        .stat-label {
            font-size: 0.8rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .details-section {
            margin-top: 15px;
        }

        .details-title {
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f2ff;
        }

        .detail-item {
            background: #f8f9ff;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-date {
            font-weight: bold;
            color: #333;
        }

        .detail-type {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .detail-type.F {
            background: #fff5f5;
            color: #dc3545;
            border: 1px solid #dc3545;
        }

        .detail-type.A {
            background: #f0fff4;
            color: #28a745;
            border: 1px solid #28a745;
        }

        .detail-type.P {
            background: #f0f9ff;
            color: #17a2b8;
            border: 1px solid #17a2b8;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.2rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #dc3545;
            background: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #dc3545;
        }

        .success {
            color: #28a745;
            background: #f0fff4;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #28a745;
        }

        .filter-section {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .student-stats {
                grid-template-columns: 1fr 1fr;
            }
            
            .header h1 {
                font-size: 2rem;
            }

            .summary-stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Sistema de Fichas Disciplinares</h1>
            <p>Conectado diretamente ao Google Sheets - Atualização automática</p>
        </div>

        <div class="card">
            <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">Configuração da Planilha</h2>
            
            <div class="config-section">
                <div class="input-group">
                    <label for="planilhaUrl">🔗 URL da Planilha do Google Sheets</label>
                    <input 
                        type="text" 
                        id="planilhaUrl" 
                        placeholder="Cole aqui a URL da sua planilha..."
                        value="">
                    <div class="url-example">
                        Exemplo: https://docs.google.com/spreadsheets/d/1ABc...xyz/edit#gid=0
                    </div>
                </div>

                <div class="input-group">
                    <label for="abaFaltas">📊 Nome da Aba de Faltas</label>
                    <input 
                        type="text" 
                        id="abaFaltas" 
                        placeholder="Nome da aba com os dados de faltas"
                        value="BD_Faltas">
                </div>

                <div class="input-group">
                    <label for="abaDisciplinares">⚖️ Nome da Aba de Medidas Disciplinares</label>
                    <input 
                        type="text" 
                        id="abaDisciplinares" 
                        placeholder="Nome da aba com medidas disciplinares"
                        value="BD_Disciplinares">
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="carregarBtn" onclick="carregarDados()">
                    🔄 Carregar Dados
                </button>
                <button class="btn success" id="exportBtn" disabled onclick="exportToPDF()">
                    📄 Exportar PDF
                </button>
            </div>
        </div>

        <div id="results" class="results" style="display: none;">
            <div class="card">
                <h2 style="text-align: center; margin-bottom: 30px; color: #667eea;">Relatório Geral</h2>
                
                <div class="summary-stats" id="summaryStats"></div>

                <div class="filter-section">
                    <div class="filter-group">
                        <label>🎯 Filtrar por Turma:</label>
                        <select id="filtroTurma" onchange="filtrarAlunos()">
                            <option value="">Todas as turmas</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>👤 Filtrar por Aluno:</label>
                        <select id="filtroAluno" onchange="filtrarAlunos()">
                            <option value="">Todos os alunos</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>📈 Ordenar por:</label>
                        <select id="ordenacao" onchange="ordenarAlunos()">
                            <option value="nome">Nome (A-Z)</option>
                            <option value="totalFaltas">Total de Faltas</option>
                            <option value="faltasInjustificadas">Faltas Injustificadas</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <button class="btn" onclick="limparFiltros()" style="padding: 8px 15px; font-size: 0.9rem; margin-top: 20px;">
                            🔄 Limpar Filtros
                        </button>
                    </div>
                </div>

                <div id="turmaReport" style="display: none;"></div>
                
                <h3 style="color: #667eea; margin-bottom: 20px;">Fichas Individuais</h3>
                <div id="studentsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let processedData = [];
        let filteredData = [];

        async function carregarDados() {
            const planilhaUrl = document.getElementById('planilhaUrl').value.trim();
            const abaFaltas = document.getElementById('abaFaltas').value.trim();
            const abaDisciplinares = document.getElementById('abaDisciplinares').value.trim();

            if (!planilhaUrl) {
                showMessage('Por favor, insira a URL da planilha!', 'error');
                return;
            }

            showMessage('Carregando dados da planilha...', 'loading');

            try {
                // Extrair ID da planilha da URL
                const sheetId = extractSheetId(planilhaUrl);
                if (!sheetId) {
                    throw new Error('URL da planilha inválida');
                }

                // Carregar dados de faltas
                const faltasData = await carregarAbaCSV(sheetId, abaFaltas);
                console.log('Dados de faltas carregados:', faltasData.length, 'registros');

                // Tentar carregar dados disciplinares
                let disciplinaresData = [];
                if (abaDisciplinares) {
                    try {
                        disciplinaresData = await carregarAbaCSV(sheetId, abaDisciplinares);
                        console.log('Dados disciplinares carregados:', disciplinaresData.length, 'registros');
                    } catch (error) {
                        console.log('Erro ao carregar dados disciplinares:', error.message);
                        showMessage(`Aviso: Não foi possível carregar medidas disciplinares. Continuando só com faltas...`, 'error');
                    }
                }

                // Processar dados
                processedData = processarDados(faltasData, disciplinaresData);
                filteredData = [...processedData];
                
                displayResults();
                document.getElementById('exportBtn').disabled = false;
                
                // Mostrar informações sobre os dados carregados
                const infoFaltas = `${faltasData.length} registros de faltas`;
                const infoDisciplinares = disciplinaresData.length > 0 ? 
                    `, ${disciplinaresData.length} registros de medidas disciplinares` : 
                    ', nenhuma medida disciplinar encontrada';
                
                showMessage(`✅ Dados carregados com sucesso! ${processedData.length} alunos encontrados. (${infoFaltas}${infoDisciplinares})`, 'success');

            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showMessage(`Erro ao carregar dados: ${error.message}`, 'error');
            }
        }

        function extractSheetId(url) {
            const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : null;
        }

        async function carregarAbaCSV(sheetId, abaName) {
            const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(abaName)}`;
            
            const response = await fetch(csvUrl);
            if (!response.ok) {
                throw new Error(`Não foi possível carregar a aba "${abaName}"`);
            }
            
            const csvText = await response.text();
            return parseCSV(csvText);
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
                if (values.length >= headers.length && values[0]) {
                    const row = {};
                    headers.forEach((header, index) => {
                        row[header] = values[index] || '';
                    });
                    data.push(row);
                }
            }

            return data;
        }

        function processarDados(faltasData, disciplinaresData = []) {
            const studentsMap = new Map();

            // Processar faltas
            faltasData.forEach(row => {
                const nome = (row.nome || row['nome do aluno'] || row.aluno || '').toString().trim();
                const turma = (row.turma || row.classe || 'N/A').toString().trim();
                const data = (row.data || 'N/A').toString().trim();
                const tipo = (row.tipo || 'P').toString().trim().toUpperCase();

                if (!nome) return;

                if (!studentsMap.has(nome)) {
                    studentsMap.set(nome, {
                        nome: nome,
                        turma: turma,
                        faltas: [],
                        medidas: [],
                        totalRegistros: 0,
                        totalFaltas: 0,
                        faltasJustificadas: 0,
                        faltasInjustificadas: 0,
                        diasPresentes: 0
                    });
                }

                const student = studentsMap.get(nome);
                
                // Atualizar turma se estava como N/A
                if (student.turma === 'N/A' && turma !== 'N/A') {
                    student.turma = turma;
                }

                student.faltas.push({
                    data: data,
                    tipo: tipo
                });

                student.totalRegistros++;

                if (tipo === 'F') {
                    student.totalFaltas++;
                    student.faltasInjustificadas++;
                } else if (tipo === 'A') {
                    student.totalFaltas++;
                    student.faltasJustificadas++;
                } else if (tipo === 'P') {
                    student.diasPresentes++;
                }
            });

            // Processar medidas disciplinares
            disciplinaresData.forEach(row => {
                const nome = (row.nome || row['nome do aluno'] || row.aluno || '').toString().trim();
                const data = (row.data || row['data da ocorrência'] || 'N/A').toString().trim();
                const medida = (row.medida || row['tipo de medida'] || 'N/A').toString().trim();
                const motivo = (row.motivo || row.descrição || row.observações || 'N/A').toString().trim();

                if (!nome) return;

                if (!studentsMap.has(nome)) {
                    studentsMap.set(nome, {
                        nome: nome,
                        turma: 'N/A',
                        faltas: [],
                        medidas: [],
                        totalRegistros: 0,
                        totalFaltas: 0,
                        faltasJustificadas: 0,
                        faltasInjustificadas: 0,
                        diasPresentes: 0
                    });
                }

                const student = studentsMap.get(nome);
                student.medidas.push({
                    data: data,
                    medida: medida,
                    motivo: motivo
                });
            });

            return Array.from(studentsMap.values()).sort((a, b) => a.nome.localeCompare(b.nome));
        }

        function displayResults() {
            displaySummaryStats();
            populateFilters();
            displayStudents();
            
            const resultsSection = document.getElementById('results');
            resultsSection.style.display = 'block';
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function displaySummaryStats() {
            const container = document.getElementById('summaryStats');
            
            const totalAlunos = processedData.length;
            const totalFaltas = processedData.reduce((sum, student) => sum + student.totalFaltas, 0);
            const totalInjustificadas = processedData.reduce((sum, student) => sum + student.faltasInjustificadas, 0);
            const totalJustificadas = processedData.reduce((sum, student) => sum + student.faltasJustificadas, 0);
            const totalMedidas = processedData.reduce((sum, student) => sum + student.medidas.length, 0);

            container.innerHTML = `
                <div class="summary-box">
                    <div class="summary-number">${totalAlunos}</div>
                    <div class="summary-label">Total de Alunos</div>
                </div>
                <div class="summary-box">
                    <div class="summary-number">${totalFaltas}</div>
                    <div class="summary-label">Total de Faltas</div>
                </div>
                <div class="summary-box">
                    <div class="summary-number">${totalInjustificadas}</div>
                    <div class="summary-label">Faltas Injustificadas</div>
                </div>
                <div class="summary-box">
                    <div class="summary-number">${totalJustificadas}</div>
                    <div class="summary-label">Faltas Justificadas</div>
                </div>
                <div class="summary-box">
                    <div class="summary-number">${totalMedidas}</div>
                    <div class="summary-label">Medidas Disciplinares</div>
                </div>
            `;
        }

        function populateFilters() {
            const filtroTurma = document.getElementById('filtroTurma');
            const filtroAluno = document.getElementById('filtroAluno');
            
            // Populate turmas
            const turmas = [...new Set(processedData.map(student => student.turma))].sort();
            filtroTurma.innerHTML = '<option value="">Todas as turmas</option>';
            turmas.forEach(turma => {
                filtroTurma.innerHTML += `<option value="${turma}">${turma}</option>`;
            });
            
            // Populate alunos
            const alunos = [...new Set(processedData.map(student => student.nome))].sort();
            filtroAluno.innerHTML = '<option value="">Todos os alunos</option>';
            alunos.forEach(aluno => {
                filtroAluno.innerHTML += `<option value="${aluno}">${aluno}</option>`;
            });
        }

        function filtrarAlunos() {
            const turmaFiltro = document.getElementById('filtroTurma').value;
            const alunoFiltro = document.getElementById('filtroAluno').value;
            
            filteredData = processedData.filter(student => {
                const matchTurma = !turmaFiltro || student.turma === turmaFiltro;
                const matchAluno = !alunoFiltro || student.nome === alunoFiltro;
                return matchTurma && matchAluno;
            });
            
            // Atualizar lista de alunos baseada na turma selecionada
            if (turmaFiltro && !alunoFiltro) {
                updateAlunoFilter(turmaFiltro);
            }
            
            // Mostrar/esconder relatório de turma
            displayTurmaReport(turmaFiltro, alunoFiltro);
            
            ordenarAlunos();
            updateResultsCount();
        }

        function updateAlunoFilter(turmaFiltrada = null) {
            const filtroAluno = document.getElementById('filtroAluno');
            const alunoAtual = filtroAluno.value;
            
            let alunosParaFiltro;
            if (turmaFiltrada) {
                alunosParaFiltro = processedData
                    .filter(student => student.turma === turmaFiltrada)
                    .map(student => student.nome);
            } else {
                alunosParaFiltro = processedData.map(student => student.nome);
            }
            
            const alunosUnicos = [...new Set(alunosParaFiltro)].sort();
            
            filtroAluno.innerHTML = '<option value="">Todos os alunos</option>';
            alunosUnicos.forEach(aluno => {
                const selected = aluno === alunoAtual ? 'selected' : '';
                filtroAluno.innerHTML += `<option value="${aluno}" ${selected}>${aluno}</option>`;
            });
        }

        function limparFiltros() {
            document.getElementById('filtroTurma').value = '';
            document.getElementById('filtroAluno').value = '';
            document.getElementById('ordenacao').value = 'nome';
            
            filteredData = [...processedData];
            updateAlunoFilter();
            displayTurmaReport('', '');
            ordenarAlunos();
            updateResultsCount();
        }

        function updateResultsCount() {
            const totalMostrados = filteredData.length;
            const totalGeral = processedData.length;
            
            let contadorTexto = '';
            if (totalMostrados !== totalGeral) {
                contadorTexto = ` (${totalMostrados} de ${totalGeral} alunos)`;
            }
            
            const tituloFichas = document.querySelector('h3');
            if (tituloFichas) {
                tituloFichas.textContent = `Fichas Individuais${contadorTexto}`;
            }
        }

        function displayTurmaReport(turmaFiltro, alunoFiltro) {
            const turmaReportDiv = document.getElementById('turmaReport');
            
            // Só mostrar relatório de turma se turma estiver selecionada E aluno não estiver selecionado
            if (turmaFiltro && !alunoFiltro) {
                const alunosDaTurma = filteredData;
                const relatorio = generateTurmaReport(turmaFiltro, alunosDaTurma);
                turmaReportDiv.innerHTML = relatorio;
                turmaReportDiv.style.display = 'block';
            } else {
                turmaReportDiv.style.display = 'none';
            }
        }

        function generateTurmaReport(turma, alunos) {
            if (alunos.length === 0) return '';
            
            // Calcular estatísticas da turma
            const totalAlunos = alunos.length;
            const totalFaltas = alunos.reduce((sum, student) => sum + student.totalFaltas, 0);
            const totalInjustificadas = alunos.reduce((sum, student) => sum + student.faltasInjustificadas, 0);
            const totalJustificadas = alunos.reduce((sum, student) => sum + student.faltasJustificadas, 0);
            const totalMedidas = alunos.reduce((sum, student) => sum + student.medidas.length, 0);
            
            // Alunos com mais faltas (top 5)
            const alunosComMaisFaltas = [...alunos]
                .sort((a, b) => b.totalFaltas - a.totalFaltas)
                .slice(0, 5);
            
            // Alunos com medidas disciplinares
            const alunosComMedidas = alunos.filter(student => student.medidas.length > 0);
            
            // Média de faltas por aluno
            const mediaFaltas = totalAlunos > 0 ? (totalFaltas / totalAlunos).toFixed(1) : 0;
            
            return `
                <div class="card" style="background: linear-gradient(135deg, #e8f2ff, #f8fbff); border: 2px solid #667eea; margin-bottom: 30px;">
                    <h2 style="text-align: center; color: #667eea; margin-bottom: 25px;">
                        📊 Relatório da Turma ${turma}
                    </h2>
                    
                    <div class="summary-stats" style="margin-bottom: 25px;">
                        <div class="summary-box">
                            <div class="summary-number">${totalAlunos}</div>
                            <div class="summary-label">Alunos na Turma</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-number">${mediaFaltas}</div>
                            <div class="summary-label">Média de Faltas</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-number">${totalInjustificadas}</div>
                            <div class="summary-label">Faltas Injustificadas</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-number">${totalJustificadas}</div>
                            <div class="summary-label">Faltas Justificadas</div>
                        </div>
                        <div class="summary-box">
                            <div class="summary-number">${totalMedidas}</div>
                            <div class="summary-label">Medidas Aplicadas</div>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px;">
                        <div>
                            <h4 style="color: #667eea; margin-bottom: 15px; border-bottom: 2px solid #e8f2ff; padding-bottom: 8px;">
                                🔥 Alunos com Mais Faltas
                            </h4>
                            ${alunosComMaisFaltas.map((student, index) => `
                                <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid ${index === 0 ? '#dc3545' : index === 1 ? '#fd7e14' : '#ffc107'};">
                                    <strong>${student.nome}</strong><br>
                                    <small style="color: #666;">
                                        Total: ${student.totalFaltas} | 
                                        Injustificadas: ${student.faltasInjustificadas} | 
                                        Justificadas: ${student.faltasJustificadas}
                                    </small>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div>
                            <h4 style="color: #667eea; margin-bottom: 15px; border-bottom: 2px solid #e8f2ff; padding-bottom: 8px;">
                                ⚖️ Alunos com Medidas Disciplinares
                            </h4>
                            ${alunosComMedidas.length > 0 ? 
                                alunosComMedidas.slice(0, 5).map(student => `
                                    <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #dc3545;">
                                        <strong>${student.nome}</strong><br>
                                        <small style="color: #666;">
                                            ${student.medidas.length} medida(s) aplicada(s)
                                        </small>
                                    </div>
                                `).join('') 
                                : 
                                '<div style="text-align: center; color: #28a745; font-style: italic; padding: 20px;">✅ Nenhuma medida disciplinar aplicada!</div>'
                            }
                        </div>
                    </div>
                    
                    <div style="text-align: center; margin-top: 20px; padding-top: 15px; border-top: 1px solid #e8f2ff;">
                        <button class="btn" onclick="exportTurmaPDF('${turma}')" style="background: linear-gradient(135deg, #28a745, #20c997);">
                            📄 Exportar Relatório da Turma ${turma}
                        </button>
                    </div>
                </div>
            `;
        }

        function ordenarAlunos() {
            const ordenacao = document.getElementById('ordenacao').value;
            
            filteredData.sort((a, b) => {
                switch (ordenacao) {
                    case 'totalFaltas':
                        return b.totalFaltas - a.totalFaltas;
                    case 'faltasInjustificadas':
                        return b.faltasInjustificadas - a.faltasInjustificadas;
                    default:
                        return a.nome.localeCompare(b.nome);
                }
            });
            
            displayStudents();
        }

        function displayStudents() {
            const container = document.getElementById('studentsContainer');
            container.innerHTML = '';

            filteredData.forEach(student => {
                const studentCard = createStudentCard(student);
                container.appendChild(studentCard);
            });
        }

        function createStudentCard(student) {
            const card = document.createElement('div');
            card.className = 'student-card';
            
            card.innerHTML = `
                <div class="student-header">
                    <div class="student-name">${student.nome}</div>
                    <div class="student-class">${student.turma}</div>
                </div>
                
                <div class="student-stats">
                    <div class="stat-box">
                        <div class="stat-number total">${student.totalFaltas}</div>
                        <div class="stat-label">Total de Faltas</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number injustificada">${student.faltasInjustificadas}</div>
                        <div class="stat-label">Injustificadas (F)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number justificada">${student.faltasJustificadas}</div>
                        <div class="stat-label">Justificadas (A)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number presente">${student.diasPresentes}</div>
                        <div class="stat-label">Dias Presentes (P)</div>
                    </div>
                    ${student.medidas.length > 0 ? `
                    <div class="stat-box">
                        <div class="stat-number total">${student.medidas.length}</div>
                        <div class="stat-label">Medidas Disciplinares</div>
                    </div>
                    ` : ''}
                </div>

                ${student.faltas.length > 0 ? `
                <div class="details-section">
                    <div class="details-title">📅 Últimos Registros de Frequência</div>
                    ${student.faltas.slice(-10).reverse().map(falta => `
                        <div class="detail-item">
                            <span class="detail-date">${falta.data}</span>
                            <span class="detail-type ${falta.tipo}">
                                ${falta.tipo === 'F' ? 'FALTA' : falta.tipo === 'A' ? 'ATESTADO' : 'PRESENTE'}
                            </span>
                        </div>
                    `).join('')}
                    ${student.faltas.length > 10 ? `<div style="text-align: center; color: #666; font-style: italic; margin-top: 10px;">... e mais ${student.faltas.length - 10} registros</div>` : ''}
                </div>
                ` : ''}

                ${student.medidas.length > 0 ? `
                <div class="details-section">
                    <div class="details-title">⚖️ Medidas Disciplinares</div>
                    ${student.medidas.slice(0, 5).map(medida => `
                        <div class="detail-item">
                            <div>
                                <strong>${medida.data}</strong> - ${medida.medida}<br>
                                <small style="color: #666;">${medida.motivo}</small>
                            </div>
                        </div>
                    `).join('')}
                    ${student.medidas.length > 5 ? `<div style="text-align: center; color: #666; font-style: italic; margin-top: 10px;">... e mais ${student.medidas.length - 5} medidas</div>` : ''}
                </div>
                ` : ''}
            `;

            return card;
        }

        function exportToPDF() {
            if (filteredData.length === 0) {
                showMessage('Nenhum dado para exportar!', 'error');
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                let yPos = 20;
                const pageHeight = doc.internal.pageSize.height;
                
                // Título do relatório
                doc.setFontSize(18);
                doc.setTextColor(102, 126, 234);
                doc.text('RELATÓRIO DISCIPLINAR ESCOLAR', 20, yPos);
                yPos += 15;
                
                doc.setFontSize(12);
                doc.setTextColor(0, 0, 0);
                doc.text(`Data de geração: ${new Date().toLocaleDateString('pt-BR')}`, 20, yPos);
                doc.text(`Total de alunos: ${filteredData.length}`, 120, yPos);
                yPos += 20;

                // Estatísticas gerais
                const totalFaltas = filteredData.reduce((sum, student) => sum + student.totalFaltas, 0);
                const totalInjustificadas = filteredData.reduce((sum, student) => sum + student.faltasInjustificadas, 0);
                
                doc.setFontSize(14);
                doc.setTextColor(102, 126, 234);
                doc.text('RESUMO GERAL', 20, yPos);
                yPos += 10;
                
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                doc.text(`Total de Faltas: ${totalFaltas} | Injustificadas: ${totalInjustificadas} | Justificadas: ${totalFaltas - totalInjustificadas}`, 20, yPos);
                yPos += 20;

                filteredData.forEach((student, index) => {
                    // Verificar se precisa de nova página
                    if (yPos > pageHeight - 60) {
                        doc.addPage();
                        yPos = 20;
                    }

                    // Cabeçalho do aluno
                    doc.setFontSize(14);
                    doc.setTextColor(102, 126, 234);
                    doc.text(`${index + 1}. ${student.nome}`, 20, yPos);
                    yPos += 8;
                    
                    doc.setFontSize(10);
                    doc.setTextColor(100, 100, 100);
                    doc.text(`Turma: ${student.turma}`, 20, yPos);
                    yPos += 12;

                    // Estatísticas
                    doc.setFontSize(12);
                    doc.setTextColor(0, 0, 0);
                    
                    doc.text(`Total de Faltas: ${student.totalFaltas}`, 20, yPos);
                    doc.text(`Injustificadas: ${student.faltasInjustificadas}`, 80, yPos);
                    doc.text(`Justificadas: ${student.faltasJustificadas}`, 140, yPos);
                    yPos += 15;

                    // Últimas faltas (resumo)
                    if (student.faltas.length > 0) {
                        doc.setFontSize(11);
                        doc.setTextColor(102, 126, 234);
                        doc.text('Últimos Registros:', 20, yPos);
                        yPos += 6;
                        
                        doc.setFontSize(9);
                        doc.setTextColor(0, 0, 0);
                        student.faltas.slice(-5).forEach(falta => {
                            doc.text(`• ${falta.data} - ${falta.tipo}`, 25, yPos);
                            yPos += 5;
                        });
                        yPos += 5;
                    }

                    yPos += 10; // Espaço entre alunos
                });

                // Salvar PDF
                const fileName = `relatorio_disciplinar_${new Date().toISOString().slice(0, 10)}.pdf`;
                doc.save(fileName);
                
                showMessage('✅ PDF exportado com sucesso!', 'success');
                
            } catch (error) {
                console.error('Erro ao gerar PDF:', error);
                showMessage('Erro ao gerar PDF. Tente novamente.', 'error');
            }
        }

        function exportTurmaPDF(turma) {
            const alunosDaTurma = processedData.filter(student => student.turma === turma);
            
            if (alunosDaTurma.length === 0) {
                showMessage('Nenhum aluno encontrado nesta turma!', 'error');
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                let yPos = 20;
                const pageHeight = doc.internal.pageSize.height;
                
                // Título do relatório
                doc.setFontSize(20);
                doc.setTextColor(102, 126, 234);
                doc.text(`RELATÓRIO DA TURMA ${turma}`, 20, yPos);
                yPos += 15;
                
                doc.setFontSize(12);
                doc.setTextColor(0, 0, 0);
                doc.text(`Data de geração: ${new Date().toLocaleDateString('pt-BR')}`, 20, yPos);
                doc.text(`Total de alunos: ${alunosDaTurma.length}`, 120, yPos);
                yPos += 20;

                // Estatísticas da turma
                const totalFaltas = alunosDaTurma.reduce((sum, student) => sum + student.totalFaltas, 0);
                const totalInjustificadas = alunosDaTurma.reduce((sum, student) => sum + student.faltasInjustificadas, 0);
                const totalJustificadas = alunosDaTurma.reduce((sum, student) => sum + student.faltasJustificadas, 0);
                const totalMedidas = alunosDaTurma.reduce((sum, student) => sum + student.medidas.length, 0);
                const mediaFaltas = (totalFaltas / alunosDaTurma.length).toFixed(1);
                
                doc.setFontSize(16);
                doc.setTextColor(102, 126, 234);
                doc.text('RESUMO DA TURMA', 20, yPos);
                yPos += 12;
                
                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.text(`• Total de Faltas: ${totalFaltas}`, 20, yPos);
                yPos += 8;
                doc.text(`• Faltas Injustificadas: ${totalInjustificadas}`, 20, yPos);
                yPos += 8;
                doc.text(`• Faltas Justificadas: ${totalJustificadas}`, 20, yPos);
                yPos += 8;
                doc.text(`• Medidas Disciplinares: ${totalMedidas}`, 20, yPos);
                yPos += 8;
                doc.text(`• Média de Faltas por Aluno: ${mediaFaltas}`, 20, yPos);
                yPos += 20;

                // Top 5 alunos com mais faltas
                const topAlunos = [...alunosDaTurma].sort((a, b) => b.totalFaltas - a.totalFaltas).slice(0, 5);
                
                doc.setFontSize(14);
                doc.setTextColor(102, 126, 234);
                doc.text('ALUNOS COM MAIS FALTAS', 20, yPos);
                yPos += 10;
                
                doc.setFontSize(10);
                doc.setTextColor(0, 0, 0);
                topAlunos.forEach((student, index) => {
                    if (yPos > pageHeight - 40) {
                        doc.addPage();
                        yPos = 20;
                    }
                    doc.text(`${index + 1}. ${student.nome} - Total: ${student.totalFaltas} (Inj: ${student.faltasInjustificadas})`, 25, yPos);
                    yPos += 7;
                });
                yPos += 15;

                // Alunos com medidas disciplinares
                const alunosComMedidas = alunosDaTurma.filter(student => student.medidas.length > 0);
                
                if (alunosComMedidas.length > 0) {
                    doc.setFontSize(14);
                    doc.setTextColor(102, 126, 234);
                    doc.text('ALUNOS COM MEDIDAS DISCIPLINARES', 20, yPos);
                    yPos += 10;
                    
                    doc.setFontSize(10);
                    doc.setTextColor(0, 0, 0);
                    alunosComMedidas.forEach(student => {
                        if (yPos > pageHeight - 40) {
                            doc.addPage();
                            yPos = 20;
                        }
                        doc.text(`• ${student.nome} - ${student.medidas.length} medida(s)`, 25, yPos);
                        yPos += 7;
                    });
                } else {
                    doc.setFontSize(14);
                    doc.setTextColor(40, 167, 69);
                    doc.text('✓ NENHUMA MEDIDA DISCIPLINAR APLICADA', 20, yPos);
                    yPos += 10;
                }

                // Salvar PDF
                const fileName = `relatorio_turma_${turma}_${new Date().toISOString().slice(0, 10)}.pdf`;
                doc.save(fileName);
                
                showMessage(`✅ Relatório da turma ${turma} exportado com sucesso!`, 'success');
                
            } catch (error) {
                console.error('Erro ao gerar PDF:', error);
                showMessage('Erro ao gerar PDF. Tente novamente.', 'error');
            }
        }

        function showMessage(message, type) {
            // Remove mensagens anteriores
            const existingMessages = document.querySelectorAll('.message');
            existingMessages.forEach(msg => msg.remove());

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.style.position = 'fixed';
            messageDiv.style.top = '20px';
            messageDiv.style.right = '20px';
            messageDiv.style.zIndex = '1000';
            messageDiv.style.padding = '15px 20px';
            messageDiv.style.borderRadius = '8px';
            messageDiv.style.maxWidth = '400px';
            messageDiv.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';

            if (type === 'loading') {
                messageDiv.innerHTML = message;
                messageDiv.style.background = '#f8f9ff';
                messageDiv.style.color = '#667eea';
                messageDiv.style.border = '1px solid #667eea';
            } else if (type === 'error') {
                messageDiv.innerHTML = '❌ ' + message;
                messageDiv.style.background = '#fff5f5';
                messageDiv.style.color = '#dc3545';
                messageDiv.style.borderLeft = '4px solid #dc3545';
            } else if (type === 'success') {
                messageDiv.innerHTML = message;
                messageDiv.style.background = '#f0fff4';
                messageDiv.style.color = '#28a745';
                messageDiv.style.borderLeft = '4px solid #28a745';
            }

            document.body.appendChild(messageDiv);

            if (type !== 'loading') {
                setTimeout(() => {
                    messageDiv.style.opacity = '0';
                    setTimeout(() => messageDiv.remove(), 300);
                }, 4000);
            }
        }
    </script>
</body>
</html>
